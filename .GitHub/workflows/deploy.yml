name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inject Secrets into HTML
        env:
          GEMINI: ${{ secrets.GEMINI }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          python3 -c "
import os
with open('index.html', 'r') as f:
    content = f.read()
content = content.replace('%%GEMINI%%', os.environ['GEMINI'])
content = content.replace('%%FIREBASE_DB_URL%%', os.environ['FIREBASE_DB_URL'])
with open('index.html', 'w') as f:
    f.write(content)
print('Secrets injected!')
"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: quiz-khush
        continue-on-error: true

      - name: Done
        run: echo "Deploy complete!"
