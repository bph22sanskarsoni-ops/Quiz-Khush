<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Khush</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap');

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --gold: #ffd700;
      --green: #00e676;
      --text: #eaeaea;
      --muted: #888;
      --border: #2a2a4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── SCREENS ─── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }

    /* ─── AUTH SCREEN ─── */
    #authScreen {
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0f0f1a 70%);
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(233,69,96,0.15);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .auth-tabs {
      display: flex;
      background: var(--card);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--accent);
      color: white;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .input-group input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Baloo 2', cursive;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 8px;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(233,69,96,0.4); }
    .btn-primary:active { transform: translateY(0); }

    .auth-error {
      color: var(--accent);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

    /* ─── HOME SCREEN ─── */
    #homeScreen {
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-family: 'Baloo 2', cursive;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topbar-actions { display: flex; align-items: center; gap: 12px; }

    .uid-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: border 0.2s;
    }

    .uid-badge span { color: var(--accent); font-weight: 700; }
    .uid-badge:hover { border-color: var(--accent); }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    .home-body {
      display: flex;
      flex: 1;
      gap: 0;
      height: calc(100vh - 65px);
    }

    /* ─── CENTER PANEL ─── */
    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
    }

    .welcome-card {
      text-align: center;
    }

    .avatar-big {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #f5a623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 16px;
      box-shadow: 0 0 30px rgba(233,69,96,0.4);
    }

    .welcome-card h2 {
      font-family: 'Baloo 2', cursive;
      font-size: 1.8rem;
      font-weight: 800;
    }

    .welcome-card p { color: var(--muted); margin-top: 6px; }

    .action-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 160px;
    }

    .action-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(233,69,96,0.2);
    }

    .action-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .action-card h3 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; }
    .action-card p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

    /* ─── RIGHT PANEL (Friends) ─── */
    .right-panel {
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h3 {
      font-family: 'Baloo 2', cursive;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .add-friend-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .add-friend-row input {
      flex: 1;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }

    .add-friend-row input:focus { border-color: var(--accent); }

    .btn-small {
      padding: 8px 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-small:hover { opacity: 0.85; }

    .friends-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .friend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      transition: background 0.15s;
      cursor: default;
    }

    .friend-item:hover { background: var(--card); }

    .friend-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0f3460, #e94560);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      position: relative;
    }

    .online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--surface);
    }

    .offline-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      border: 2px solid var(--surface);
    }

    .friend-info { flex: 1; min-width: 0; }
    .friend-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .friend-status { font-size: 0.75rem; color: var(--muted); }

    .friend-actions { display: flex; gap: 6px; }

    .btn-invite {
      padding: 5px 10px;
      background: var(--accent2);
      border: 1px solid #1a4a80;
      border-radius: 8px;
      color: #7ec8e3;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-invite:hover { background: var(--accent); border-color: var(--accent); color: white; }

    .no-friends {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 32px 16px;
    }

    /* ─── NOTIFICATIONS PANEL (Free Fire style) ─── */
    #notifPanel {
      position: fixed;
      top: 70px;
      right: 16px;
      width: 320px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .notif-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: all;
      animation: slideIn 0.3s ease;
      border-left: 3px solid var(--accent);
    }

    .notif-card.friend-req { border-left-color: #f5a623; }
    .notif-card.room-req { border-left-color: var(--green); }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(120%); opacity: 0; }
    }

    .notif-icon { font-size: 1.8rem; flex-shrink: 0; }
    .notif-info { flex: 1; }
    .notif-info strong { font-size: 0.9rem; display: block; }
    .notif-info span { font-size: 0.8rem; color: var(--muted); }
    .notif-btns { display: flex; gap: 6px; flex-direction: column; }

    .btn-accept {
      padding: 6px 12px;
      background: var(--green);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-accept:hover { opacity: 0.85; }

    .btn-decline {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-decline:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── ROOM/LOBBY SCREEN ─── */
    #roomScreen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #0a1628 0%, #0f0f1a 70%);
      padding: 24px;
    }

    .room-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 0 60px rgba(15,52,96,0.3);
    }

    .room-header { text-align: center; margin-bottom: 28px; }
    .room-header h2 { font-family: 'Baloo 2', cursive; font-size: 1.8rem; font-weight: 800; }
    .room-code-display {
      display: inline-block;
      background: var(--card);
      border: 2px dashed var(--accent);
      border-radius: 12px;
      padding: 8px 20px;
      font-family: 'Baloo 2', cursive;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 6px;
      margin-top: 8px;
      cursor: pointer;
    }

    .topic-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .topic-btn {
      padding: 12px 8px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .topic-btn:hover, .topic-btn.selected {
      border-color: var(--accent);
      background: rgba(233,69,96,0.15);
      color: var(--accent);
    }

    .players-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      min-height: 60px;
    }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 14px 6px 6px;
    }

    .player-chip .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #f5a623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }

    .player-chip span { font-size: 0.85rem; font-weight: 600; }
    .player-chip.host-chip { border-color: var(--gold); }
    .player-chip.host-chip .mini-avatar { background: linear-gradient(135deg, #ffd700, #f5a623); }

    .room-actions { display: flex; gap: 12px; }
    .room-actions .btn-primary { flex: 1; }

    .btn-secondary {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'Baloo 2', cursive;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── QUIZ SCREEN ─── */
    #quizScreen {
      flex-direction: column;
      background: var(--bg);
    }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .quiz-progress {
      font-family: 'Baloo 2', cursive;
      font-size: 1rem;
      color: var(--muted);
    }

    .quiz-progress span { color: var(--accent); font-size: 1.2rem; font-weight: 800; }

    .timer-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Baloo 2', cursive;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      transition: border-color 0.5s;
    }

    .timer-circle.urgent { border-color: #ff4444; color: #ff4444; animation: pulse 0.5s infinite; }

    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .quiz-body {
      flex: 1;
      display: flex;
      gap: 24px;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .question-panel { flex: 2; display: flex; flex-direction: column; gap: 16px; }

    .question-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
    }

    .q-number {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .q-text {
      font-family: 'Baloo 2', cursive;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px 20px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn .opt-letter {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(233,69,96,0.1);
    }

    .option-btn:hover:not(:disabled) .opt-letter {
      background: var(--accent);
      color: white;
    }

    .option-btn.selected { border-color: #f5a623; background: rgba(245,166,35,0.1); }
    .option-btn.selected .opt-letter { background: #f5a623; color: #000; }
    .option-btn.correct { border-color: var(--green); background: rgba(0,230,118,0.1); }
    .option-btn.correct .opt-letter { background: var(--green); color: #000; }
    .option-btn.wrong { border-color: var(--accent); background: rgba(233,69,96,0.1); }
    .option-btn.wrong .opt-letter { background: var(--accent); color: white; }
    .option-btn:disabled { cursor: default; }

    .scoreboard-panel {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100vh - 130px);
      overflow-y: auto;
    }

    .scoreboard-panel h3 {
      font-family: 'Baloo 2', cursive;
      font-size: 1rem;
      margin-bottom: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--card);
      border-radius: 12px;
      transition: all 0.3s;
    }

    .score-rank {
      font-family: 'Baloo 2', cursive;
      font-size: 1rem;
      font-weight: 800;
      width: 24px;
      text-align: center;
      color: var(--muted);
    }

    .score-rank.first { color: var(--gold); }
    .score-rank.second { color: #c0c0c0; }
    .score-rank.third { color: #cd7f32; }

    .score-name { flex: 1; font-weight: 700; font-size: 0.9rem; }
    .score-pts {
      font-family: 'Baloo 2', cursive;
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
    }

    .score-item.me { border: 1px solid var(--accent); }

    /* ─── RESULTS SCREEN ─── */
    #resultsScreen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0f0f1a 70%);
      padding: 24px;
    }

    .results-box {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .winner-crown { font-size: 4rem; margin-bottom: 8px; animation: float 2s ease-in-out infinite; }

    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .
